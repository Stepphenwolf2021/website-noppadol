<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Personal Library</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Sarabun:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<style>
:root{
  --bg:#171310; --panel:#211b16; --panel2:#2b231c; --line:#3d3227;
  --text:#efe6d8; --dim:#a4907a; --gold:#c9a35f; --green:#5f7a5a; --red:#a85448;
  --shelf:#4a3421;
}
*{box-sizing:border-box}
body{margin:0;font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);
  background-image:radial-gradient(ellipse at top, #201810 0%, var(--bg) 60%)}
h1,h2,h3,.serif{font-family:'Cormorant Garamond',serif;letter-spacing:.02em}
header{display:flex;align-items:baseline;gap:20px;padding:22px 28px 14px;
  border-bottom:1px double var(--line)}
header h1{margin:0;font-size:30px;color:var(--gold);font-weight:600}
header .sub{color:var(--dim);font-size:13px;font-style:italic}
#stats{margin-left:auto;display:flex;gap:22px;font-size:13px;color:var(--dim)}
#stats b{color:var(--gold);font-size:17px;font-family:'Cormorant Garamond',serif}
.bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;padding:14px 28px}
.chip{padding:6px 16px;border:1px solid var(--line);border-radius:20px;cursor:pointer;
  font-size:13px;color:var(--dim);background:none}
.chip.on{border-color:var(--gold);color:var(--gold);background:rgba(201,163,95,.08)}
input,select,textarea{background:var(--panel2);border:1px solid var(--line);color:var(--text);
  border-radius:8px;padding:8px 12px;font-size:13px;font-family:'Sarabun'}
input:focus{outline:1px solid var(--gold)}
button.act{background:var(--gold);border:none;color:#1c1610;font-weight:600;
  border-radius:8px;padding:9px 18px;cursor:pointer;font-size:13px}
button.ghost{background:none;border:1px solid var(--line);color:var(--text);
  border-radius:8px;padding:8px 14px;cursor:pointer;font-size:13px}
button.danger{background:var(--red);border:none;color:#fff;border-radius:8px;
  padding:8px 14px;cursor:pointer;font-size:13px}
/* shelf grid */
#shelf{padding:10px 28px 60px;display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:22px 18px}
.tile{cursor:pointer;transition:transform .15s}
.tile:hover{transform:translateY(-4px)}
.cover{aspect-ratio:2/3;border-radius:4px 8px 8px 4px;overflow:hidden;position:relative;
  background:linear-gradient(145deg,var(--panel2),var(--panel));
  border:1px solid var(--line);border-left:4px solid var(--shelf);
  box-shadow:0 10px 18px rgba(0,0,0,.45);
  display:flex;align-items:center;justify-content:center}
.cover.round{aspect-ratio:1/1;border-radius:50%;border-left:1px solid var(--line)}
.cover img{width:100%;height:100%;object-fit:cover}
.cover .ph{font-size:34px;opacity:.5}
.tile .t{font-size:13px;margin-top:8px;line-height:1.35;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tile .a{font-size:11.5px;color:var(--dim);font-style:italic}
.badge{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.65);
  border-radius:12px;padding:1px 8px;font-size:11px}
.lent{position:absolute;bottom:6px;left:6px;background:var(--red);
  border-radius:10px;padding:1px 8px;font-size:10.5px;color:#fff}
#pager{display:flex;gap:10px;justify-content:center;padding:0 0 40px;color:var(--dim)}
/* drawer */
#drawer{position:fixed;top:0;right:-460px;width:440px;max-width:95vw;height:100vh;
  background:var(--panel);border-left:1px solid var(--line);z-index:40;
  transition:right .25s;overflow:auto;padding:24px;box-shadow:-16px 0 40px rgba(0,0,0,.5)}
#drawer.open{right:0}
.kv{display:grid;grid-template-columns:120px 1fr;gap:5px 12px;font-size:13px;margin:12px 0}
.kv b{color:var(--dim);font-weight:400}
dialog{background:var(--panel);color:var(--text);border:1px solid var(--line);
  border-radius:14px;padding:22px;min-width:420px;max-width:560px;max-height:88vh;overflow:auto}
dialog::backdrop{background:rgba(10,7,4,.7)}
label.f{display:block;font-size:12px;color:var(--dim);margin:10px 0 3px}
.actions{position:sticky;bottom:-22px;background:var(--panel);display:flex;gap:8px;
  padding:12px 0;margin-top:14px;border-top:1px solid var(--line)}
.req::after{content:" *";color:var(--red)}
.muted{color:var(--dim);font-size:12px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:var(--panel2);border:1px solid var(--gold);padding:10px 20px;
  border-radius:10px;font-size:13px;z-index:99;display:none}
#auth{position:fixed;inset:0;background:var(--bg);z-index:60;
  display:flex;align-items:center;justify-content:center}
.ornament{color:var(--gold);text-align:center;font-size:20px;letter-spacing:.4em;opacity:.6}
</style>
</head>
<body>

<div id="auth">
  <div style="width:340px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:28px">
    <div class="ornament">❦</div>
    <h1 style="text-align:center;margin:6px 0 2px;color:var(--gold)">Personal Library</h1>
    <p class="muted" style="text-align:center;margin-top:0;font-style:italic">books · vinyl · discs</p>
    <form id="f-auth">
      <label class="f req">อีเมล หรือชื่อผู้ใช้</label>
      <input name="username" required style="width:100%" autocomplete="username"/>
      <label class="f req">รหัสผ่าน</label>
      <input name="password" type="password" required style="width:100%"/>
      <label class="f">OTP (ถ้าเปิด 2FA)</label>
      <input name="otp" inputmode="numeric" placeholder="6 หลัก" style="width:100%"/>
      <p class="muted" id="a-msg"></p>
      <button class="act" style="width:100%;margin-top:12px">เข้าห้องสมุด</button>
      <p class="muted" id="a-note" style="text-align:center"></p>
    </form>
  </div>
</div>

<header>
  <h1>Personal Library</h1>
  <span class="sub">ห้องสมุดส่วนตัว</span>
  <div id="stats"></div>
  <button class="ghost" style="margin-left:18px" onclick="doLogout()">ออก</button>
</header>

<div class="bar">
  <button class="chip on" data-type="">ทั้งหมด</button>
  <button class="chip" data-type="Book">📚 หนังสือ</button>
  <button class="chip" data-type="VinylRecord">💿 แผ่นเสียง</button>
  <button class="chip" data-type="CompactDisc">💽 CD</button>
  <button class="chip" data-type="DVD">📀 DVD</button>
  <button class="chip" id="chip-disposed" onclick="toggleDisposed()"
    title="ดูรายการที่จำหน่ายออกแล้ว (ขาย/ยกให้/สูญหาย) — กู้คืนได้จากในนี้">🗑 จำหน่ายแล้ว</button>
  <input id="q" placeholder="ค้นชื่อเรื่อง / ผู้แต่ง / ISBN / catalog no." style="width:280px"/>
  <select id="sort">
    <option value="added">ล่าสุดก่อน</option>
    <option value="title">ตามชื่อเรื่อง</option>
    <option value="year">ตามปี</option>
  </select>
  <span style="flex:1"></span>
  <button class="ghost" id="btn-view" onclick="toggleView()">🕸️ มุมมองกราฟ</button>
  <button class="act" onclick="openAdd()">+ เพิ่มรายการ</button>
</div>
<div class="bar" id="genre-bar" style="padding-top:0"></div>

<div id="shelf"></div>
<div id="pager"></div>
<div id="graph-bar" class="bar" style="display:none;padding-top:0">
  <span class="muted">ระดับ:</span>
  <button class="chip" id="gm-explore" onclick="setGraphMode('explore')"
    title="เครือข่ายความสัมพันธ์เต็ม (ผู้แต่ง งาน แนวคิด ชั้นเก็บ) — ค่าเริ่มต้นเมื่อโหนด ≤ 100">🕸 ทั้งหมด</button>
  <button class="chip" id="gm-types" onclick="setGraphMode('types')"
    title="ไล่เป็นชั้น: ประเภทสื่อ → หมวดหมู่ → รายการ">🏛 ประเภท</button>
  <button class="chip" id="gm-genres" onclick="setGraphMode('genres')"
    title="หมวดหมู่รวมทุกประเภทสื่อ → รายการ">🔖 หมวดหมู่</button>
  <span id="crumbs" style="font-size:13.5px"></span>
</div>
<div id="graph" style="display:none;height:calc(100vh - 250px);margin:0 28px 30px;
  border:1px solid var(--line);border-radius:12px;background:var(--panel)"></div>

<div id="drawer"></div>
<div class="toast" id="toast"></div>
<dialog id="dlg"></dialog>

<script>
const $=s=>document.querySelector(s);
let META=null,TYPE="",GENRE="",PAGE=1,PENDING=null;
function toast(m,bad){const t=$("#toast");t.textContent=m;
  t.style.borderColor=bad?"var(--red)":"var(--gold)";t.style.display="block";
  setTimeout(()=>t.style.display="none",3200)}
async function api(p,opt={}){
  if(opt.body&&!(opt.body instanceof FormData)){
    opt.headers={'Content-Type':'application/json'};opt.body=JSON.stringify(opt.body)}
  const r=await fetch(p,opt);
  if(r.status===401){$("#auth").style.display="flex";throw new Error("login")}
  if(!r.ok){let m;try{m=(await r.json()).detail}catch(e){m=r.statusText}
    toast(m,true);throw new Error(m)}
  return r.json();
}
function dlg(h){const d=$("#dlg");d.innerHTML=h;d.showModal();return d}

/* ---------- ชื่อฟิลด์ที่เป็นมิตร + tooltip (ชี้เมาส์ที่ช่องกรอก) ---------- */
const FIELD_META={
  title_display:{l:"ชื่อเรื่อง / อัลบั้ม",t:"ชื่อที่จะแสดงบนชั้นหนังสือ"},
  isbn_13:{l:"ISBN",t:"เลข 13 หลักใต้บาร์โค้ดด้านหลังปก (ขึ้นต้น 978/979)"},
  author_display:{l:"ผู้เขียน",t:"หลายคนคั่นด้วยจุลภาค เช่น สมชาย, สมหญิง"},
  artist_display:{l:"ศิลปิน / วง",t:"หลายชื่อคั่นด้วยจุลภาค"},
  director_display:{l:"ผู้กำกับ",t:"หลายชื่อคั่นด้วยจุลภาค"},
  publisher:{l:"สำนักพิมพ์",t:"ชื่อสำนักพิมพ์ตามหน้าปกใน"},
  label:{l:"ค่ายเพลง",t:"เช่น Blue Note, Columbia"},
  studio:{l:"สตูดิโอ",t:"ค่ายหนัง/ผู้จัดจำหน่าย"},
  year:{l:"ปีที่ออก",t:"ปี ค.ศ. ที่พิมพ์/วางจำหน่าย edition นี้"},
  language:{l:"ภาษา",t:"เช่น ไทย, English"},
  format:{l:"รูปแบบ",t:"หนังสือ: hardcover/paperback · แผ่นหนัง: DVD/Blu-ray/4K"},
  pages:{l:"จำนวนหน้า",t:"ตัวเลขอย่างเดียว"},
  edition:{l:"ครั้งที่พิมพ์ / Edition",t:"เช่น พิมพ์ครั้งแรก, 2nd edition, Deluxe"},
  series:{l:"ชุด / ซีรีส์",t:"ถ้าเป็นเล่มในชุด เช่น Harry Potter #3"},
  catalog_no:{l:"หมายเลขแคตตาล็อก",t:"รหัสบนสันแผ่น/หลังปก เช่น SRCS-1234"},
  pressing:{l:"การปั๊มแผ่น",t:"first pressing / repress / reissue"},
  rpm:{l:"ความเร็วรอบ (RPM)",t:"33 / 45 / 78"},
  size_inch:{l:"ขนาดแผ่น (นิ้ว)",t:"12 / 10 / 7"},
  grading_media:{l:"สภาพแผ่น",t:"มาตรฐาน Goldmine: M / NM / VG+ / VG / G"},
  grading_sleeve:{l:"สภาพปก",t:"มาตรฐาน Goldmine: M / NM / VG+ / VG / G"},
  discs:{l:"จำนวนแผ่น",t:"กี่แผ่นในกล่อง"},
  region:{l:"โซน (Region)",t:"เช่น Region 3, Region Free"},
  cover_url:{l:"ลิงก์รูปปก",t:"URL รูปภาพจากเว็บ — ระบบตรวจว่ามีรูปจริงก่อนบันทึก"},
  cost_basis:{l:"ราคาที่ซื้อ (บาท)",t:"ต้นทุนที่จ่ายจริง ใช้คำนวณมูลค่ารวม"},
  currency:{l:"สกุลเงิน",t:"ค่าเริ่มต้น THB"},
  note:{l:"📝 โน้ตส่วนตัว",t:"ที่มา ความทรงจำ สภาพพิเศษ — เห็นเฉพาะคุณ"},
  shelf:{l:"📍 ตำแหน่งจัดเก็บ",t:"เก็บอยู่ตู้ไหน ชั้นไหน"},
};
const flabel=k=>FIELD_META[k]?.l||k;
const ftip=k=>FIELD_META[k]?.t||"";

/* ---------- ตำแหน่งจัดเก็บ: dropdown จากรายการที่ผู้ใช้สร้างเอง ---------- */
let SHELVES=[];
async function loadShelves(){
  try{SHELVES=(await api("/api/shelves")).shelves||[]}catch(e){SHELVES=[]}
}
function shelfSelector(cur){
  const all=[...new Set([...(cur?[cur]:[]),...SHELVES])];
  const opts=all.map(s=>`<option ${s===cur?"selected":""}>${s.replace(/"/g,'&quot;')}</option>`).join("");
  return `<label class="f" title="เก็บอยู่ตู้ไหน ชั้นไหน — เลือกจากที่เคยสร้าง หรือเพิ่มใหม่">ตำแหน่งจัดเก็บ</label>
  <select name="__shelf_sel" style="width:100%"
    onchange="this.parentElement.querySelector('[name=__shelf_new]').style.display=this.value==='__new__'?'block':'none'">
    <option value="">— ไม่ระบุ —</option>${opts}
    <option value="__new__">➕ เพิ่มตำแหน่งใหม่…</option>
  </select>
  <input name="__shelf_new" style="width:100%;margin-top:6px;display:none"
    placeholder="เช่น ชั้นหนังสือหมวดถ่ายภาพ/ห้องหนังสือชั้นล่าง, ตู้หนังสือขาวในห้องทำงาน"/>`;
}
function shelfValue(fd){
  const sel=fd.get("__shelf_sel");
  return sel==="__new__"?(fd.get("__shelf_new")||"").trim():(sel||"");
}

/* ---------- ฟิลด์แบบ list (dropdown ตามประเภท + เพิ่ม/ลบตัวเลือกเอง) ---------- */
let FIELD_OPTIONS={};
async function loadOptions(){
  try{FIELD_OPTIONS=(await api("/api/options")).options||{}}catch(e){FIELD_OPTIONS={}}
}
function fieldInput(type,name,val,required){
  const tip=(ftip(name)||"").replace(/"/g,'&quot;');
  const key=type+"."+name;
  const opts=FIELD_OPTIONS[key];
  if(!opts)return `<input name="${name}" value="${String(val??"").replace(/"/g,'&quot;')}"
    title="${tip}" placeholder="${tip}" ${required?"required":""} style="width:100%"${sugAttr(name)}/>`;
  const sval=String(val??"");
  return `<div style="display:flex;gap:6px">
    <select name="${name}" title="${tip}" style="flex:1" ${required?"required":""}>
      <option value="">—</option>
      ${opts.map(o=>`<option ${sval===o?"selected":""}>${o.replace(/"/g,'&quot;')}</option>`).join("")}
      ${sval&&!opts.includes(sval)?`<option selected>${sval}</option>`:""}
    </select>
    <button class="ghost" type="button" style="padding:6px 10px" title="เพิ่มตัวเลือกใหม่ในรายการ"
      onclick='optAdd(${JSON.stringify(key)},this)'>➕</button>
    <button class="ghost" type="button" style="padding:6px 10px" title="ลบตัวเลือกที่เลือกอยู่ออกจากรายการ"
      onclick='optDel(${JSON.stringify(key)},this)'>➖</button>
  </div>`;
}
function refillSelect(sel,key,pick){
  sel.innerHTML=`<option value="">—</option>`+
    (FIELD_OPTIONS[key]||[]).map(o=>`<option>${o.replace(/"/g,'&quot;')}</option>`).join("");
  if(pick)sel.value=pick;
}
async function optAdd(key,btn){
  const v=prompt("เพิ่มตัวเลือกใหม่:");
  if(!v||!v.trim())return;
  const opts=[...new Set([...(FIELD_OPTIONS[key]||[]),v.trim()])];
  await api("/api/options",{method:"PUT",body:{key,options:opts}});
  FIELD_OPTIONS[key]=opts;
  refillSelect(btn.parentElement.querySelector("select"),key,v.trim());
  toast("เพิ่มตัวเลือกแล้ว ✓");
}
async function optDel(key,btn){
  const sel=btn.parentElement.querySelector("select");
  if(!sel.value)return toast("เลือกค่าที่จะลบออกจากรายการก่อน",true);
  if(!confirm(`ลบ "${sel.value}" ออกจากรายการตัวเลือก? (ข้อมูลเดิมที่ใช้ค่านี้ไม่ถูกแตะ)`))return;
  const opts=(FIELD_OPTIONS[key]||[]).filter(o=>o!==sel.value);
  await api("/api/options",{method:"PUT",body:{key,options:opts}});
  FIELD_OPTIONS[key]=opts;
  refillSelect(sel,key,"");
  toast("ลบตัวเลือกแล้ว");
}
const LANG_TH={en:"English",th:"ไทย",ja:"日本語",fr:"Français",de:"Deutsch",
  zh:"中文",es:"Español",it:"Italiano",ko:"한국어"};
/* เดาภาษาจากอักษรของชื่อเรื่อง (ง่ายๆ ผู้ใช้เปลี่ยนได้) */
function guessLang(title){
  const s=String(title||"");
  if(/[฀-๿]/.test(s))return"ไทย";
  if(/[ぁ-んァ-ヶ]/.test(s))return"日本語";
  if(/[가-힣]/.test(s))return"한국어";
  if(/[一-鿿]/.test(s))return"中文";
  if(/[a-zA-Z]/.test(s))return"English";
  return"";
}

/* ---------- ISBN แสดงแบบมาตรฐานมีขีด (เก็บจริงเป็น 13 หลักล้วน) ---------- */
const ISBN_RANGES={ // registrant length ranges ของ group ที่พบบ่อย
  "0":[[0,19,2],[200,699,3],[7000,8499,4],[85000,89999,5],[900000,949999,6],[9500000,9999999,7]],
  "1":[[0,9,2],[100,399,3],[4000,5499,4],[55000,86979,5],[869800,998999,6],[9990000,9999999,7]],
  "2":[[0,19,2],[200,349,3],[35000,39999,5],[400,699,3],[7000,8399,4],[84000,89999,5],[900000,949999,6],[9500000,9999999,7]],
  "3":[[0,29,2],[30,33,3],[34,69,4],[40,199,2],[200,699,3],[7000,8499,4],[85000,89999,5],[900000,949999,6],[9500000,9999999,7]],
  "4":[[0,19,2],[200,699,3],[7000,8499,4],[85000,89999,5],[900000,949999,6],[9500000,9999999,7]],
  "616":[[0,19,2],[200,699,3],[7000,8999,4],[90000,99999,5]],
  "974":[[0,19,2],[200,699,3],[7000,8499,4],[85000,89999,5],[90000,94999,5],[9500000,9999999,7]],
};
function isbnDisplay(raw){
  const s=String(raw||"").replace(/\D/g,"");
  if(s.length!==13)return raw;
  const prefix=s.slice(0,3),body=s.slice(3,12),check=s.slice(12);
  let group=null;
  for(const g of Object.keys(ISBN_RANGES).sort((a,b)=>b.length-a.length))
    if(body.startsWith(g)){group=g;break}
  if(group===null)return `${prefix}-${body}-${check}`;
  const rest=body.slice(group.length);
  for(const[lo,hi,len]of ISBN_RANGES[group]){
    const head=parseInt(rest.slice(0,String(hi).length),10);
    if(head>=lo&&head<=hi&&len<rest.length)
      return `${prefix}-${group}-${rest.slice(0,len)}-${rest.slice(len)}-${check}`;
  }
  return `${prefix}-${group}-${rest}-${check}`;
}

/* ---------- autocomplete (พิมพ์ ≥3 ตัว → แนะนำจากข้อมูลที่มีในระบบ) ---------- */
const SUG_MAP={author_display:1,artist_display:1,director_display:1,publisher:1,
  label:1,studio:1,series:1,language:1,format:1,
  __creators:"creators",__genres:"genres",__shelf:"shelf"};
function sugAttr(name){
  const f=SUG_MAP[name];if(!f)return"";
  const api=f===1?name:f;
  return ` list="dl-${name}" data-sug="${api}" autocomplete="off"`;
}
document.addEventListener("input",async e=>{
  const el=e.target,api=el.dataset?.sug;
  if(!api)return;
  // ช่องหลายค่า (คั่น ,) แนะนำจาก token สุดท้าย
  const parts=el.value.split(",");const tail=parts[parts.length-1].trim();
  if(tail.length<3)return;
  const r=await fetch(`/api/suggest?field=${api}&q=${encodeURIComponent(tail)}`);
  if(!r.ok)return;
  const vals=(await r.json()).values;
  let dl=document.getElementById("dl-"+el.name);
  if(!dl){dl=document.createElement("datalist");dl.id="dl-"+el.name;document.body.appendChild(dl)}
  const prefix=parts.length>1?parts.slice(0,-1).join(",")+", ":"";
  dl.innerHTML=vals.map(v=>`<option value="${(prefix+v).replace(/"/g,'&quot;')}">`).join("");
});

$("#f-auth").onsubmit=async e=>{

const ICON={Book:"📚",VinylRecord:"💿",CompactDisc:"💽",DVD:"📀"};
function mtype(labels){return labels.find(l=>ICON[l])||""}
async function loadShelf(){
  const p=new URLSearchParams({page:PAGE,sort:$("#sort").value});
  if(TYPE)p.set("type",TYPE);
  if($("#q").value)p.set("q",$("#q").value);
  if(GENRE)p.set("genre",GENRE);
  if(DISPOSED)p.set("disposed","true");
  const d=await api("/api/items?"+p);
  $("#shelf").innerHTML=d.items.map(i=>{
    const t=mtype(i.labels),round=t==="VinylRecord";
    const cover=(i.cover&&i.cover!=="url")?`<img src="/api/photo/${i.cover}" loading="lazy"/>`
      :(i.props.cover_url?`<img src="${i.props.cover_url}" loading="lazy"
        onerror="this.outerHTML='<span class=ph>${ICON[t]||"📕"}</span>'"/>`
      :`<span class="ph">${ICON[t]||"📕"}</span>`);
    return `<div class="tile" onclick="openItem('${i.id}')">
      <div class="cover ${round?'round':''}">${cover}
        <span class="badge">${ICON[t]}</span>
        ${i.props.lent?'<span class="lent">ยืมอยู่</span>':''}</div>
      <div class="t serif">${i.props.title_display||"—"}</div>
      <div class="a">${i.props.author_display||i.props.artist_display||i.props.director_display||""}
        ${i.props.year?" · "+i.props.year:""}</div>
    </div>`}).join("")||`<p class="muted" style="grid-column:1/-1;text-align:center;padding:60px 0">
      ยังไม่มีรายการ — เริ่มจาก 📷 ถ่ายภาพปกได้เลย</p>`;
  const pages=Math.ceil(d.total/d.size)||1;
  $("#pager").innerHTML=pages>1?
    `<button class="ghost" ${PAGE<=1?"disabled":""} onclick="PAGE--;loadShelf()">‹ ก่อนหน้า</button>
     <span style="align-self:center">${PAGE} / ${pages} · ${d.total} รายการ</span>
     <button class="ghost" ${PAGE>=pages?"disabled":""} onclick="PAGE++;loadShelf()">ถัดไป ›</button>`
    :`<span>${d.total} รายการ</span>`;
}

async function openItem(id){

  const imgs=[...(n.photos||[]).map(h=>({src:"/api/photo/"+h,hash:h,kind:"photo"})),
              ...(n.props.cover_url?[{src:n.props.cover_url,hash:"url",kind:"url"}]:[])];
  const coverHash=n.props.cover_hash||(n.photos||[])[0]||(n.props.cover_url?"url":null);
  // แสดงครบทุกช่องตาม profile ของประเภท (ให้ตรงกับหน้าแก้ไข) ช่องว่าง = ยังไม่ระบุ
  //   ช่องพิเศษที่เพิ่มในอนาคต (key นอก profile) จะถูกรวมผ่าน Object.keys(n.props) โดยอัตโนมัติ
  const HIDEV=["disposed","created_at","cover_hash","cover_url_removed","item_id"];
  const profK=(META.types[t]?.props||[]).map(p=>p[0]);
  const kvKeys=[...new Set(["title_display",...profK,"cover_url","note",
    ...Object.keys(n.props).filter(k=>!HIDEV.includes(k))])].filter(k=>!HIDEV.includes(k));
  const NONE=`<span class="muted" style="opacity:.6">— ยังไม่ระบุ —</span>`;
  const cell=(k,v)=>{
    if(v==null||v==="")return NONE;
    const sv=String(v);
    if(/^https?:\/\//.test(sv))
      return `<a href="${sv}" style="color:var(--gold);word-break:break-all"
          onclick='window.open(${JSON.stringify(sv)},"libwin",
          "noopener,width=720,height=880,top=60,left=120");return false'>${
          sv.length>52?sv.slice(0,52)+"…":sv} ↗</a>`;
    if(k==="isbn_13")return isbnDisplay(sv);
    return sv.replace(/</g,"&lt;");
  };
  const kv=kvKeys.map(k=>
    `<b title="${ftip(k).replace(/"/g,'&quot;')}">${flabel(k)}</b><span>${cell(k,n.props[k])}</span>`
  ).join("")+

    `<b>${flabel("shelf")}</b><span>${n.shelf||NONE}</span>`;

    <div style="display:flex;justify-content:space-between;align-items:start">
      <h2 class="serif" style="margin:0;color:var(--gold)">${n.props.title_display||"—"}</h2>
      <button class="ghost" onclick="$('#drawer').classList.remove('open')">✕</button></div>
    <p class="muted" style="font-style:italic;margin:4px 0 12px">
      ${ICON[t]} ${t}
      ${n.creators.map(c=>` · <a href="#" title="ดูโปรไฟล์ ประวัติ และความสัมพันธ์ของ ${c}"
        style="color:var(--gold)"
        onclick='openPerson(${JSON.stringify(c)});return false'>${c}</a>`).join("")}
      ${n.genres.length?" · "+n.genres.join(" / "):""}</p>
    ${imgs.length?`<div style="display:flex;gap:8px;overflow-x:auto;margin-bottom:10px">`+
      imgs.map(im=>`<span style="text-align:center">
        <img src="${im.src}" style="height:150px;border-radius:8px;cursor:zoom-in;display:block;
          ${im.hash===coverHash?'outline:2px solid var(--gold)':''}"
          onclick="viewImage('${im.src}')"/>
        <span style="display:flex;gap:4px;justify-content:center;margin-top:3px">
        ${im.hash===coverHash
          ?`<span class="muted" style="font-size:11px">★ ภาพปก${im.kind==="url"?" (ลิงก์)":""}</span>`
          :`<button class="ghost" style="padding:1px 8px;font-size:11px"
             onclick='setCover(${JSON.stringify(id)},${JSON.stringify(im.hash)})'>ตั้งเป็นปก</button>`}

function buildFields(type,vals={}){
  $("#add-fields").innerHTML=META.types[type].props.map(p=>{
    const tip=(ftip(p[0])||p[2]||"").replace(/"/g,'&quot;');
    return `<label class="f ${p[1]?'req':''}" title="${tip}">${flabel(p[0])}</label>
     ${fieldInput(type,p[0],vals[p[0]],p[1])}`}).join("");
}
function setVal(name,v,onlyIfEmpty){
  const el=document.querySelector(`#f-item [name="${name}"]`);
  if(!el||v==null||v==="")return;
  if(onlyIfEmpty&&el.value&&el.value.trim())return;   // เติมเฉพาะช่องว่าง
  const val=Array.isArray(v)?v.join(", "):String(v);
  if(el.tagName==="SELECT"&&![...el.options].some(o=>o.value===val)){
    const o=document.createElement("option");o.textContent=val;el.appendChild(o);
  }
  el.value=val;
}
function fillForm(type,data,onlyEmpty){
  if(type&&META.types[type]&&$("#add-type").value!==type){$("#add-type").value=type;
    buildFields(type,data.props||{});}
  setVal("title_display",data.title,onlyEmpty);
  for(const[k,v]of Object.entries(data.props||{}))setVal(k,v,onlyEmpty);
  if(data.by){setVal("author_display",data.by,onlyEmpty);setVal("artist_display",data.by,onlyEmpty);
    setVal("director_display",data.by,onlyEmpty);}
  if(data.publisher){setVal("publisher",data.publisher,onlyEmpty);setVal("label",data.publisher,onlyEmpty);
    setVal("studio",data.publisher,onlyEmpty);}
  if(data.year)setVal("year",data.year,onlyEmpty);
  if(data.cover_url)setVal("cover_url",data.cover_url,onlyEmpty);
  if((data.fields||{}).genres)
    setVal("__genres",(data.fields.genres||[]).map(g=>String(g).toLowerCase()),onlyEmpty);
  for(const[k,v]of Object.entries(data.fields||{})){
    if(k==="genres")continue;
    if(k==="isbn_13"){setVal(k,String(v).replace(/\D/g,""),onlyEmpty);continue}
    if(k==="language"){setVal(k,LANG_TH[v]||v,onlyEmpty);continue}
    setVal(k,v,onlyEmpty);
  }
  // ถ้ายังไม่มีภาษา เดาจากอักษรของชื่อเรื่อง
  const lg=guessLang(data.title);
  if(lg)setVal("language",lg,true);
}
/* ย่อภาพก่อนอัปโหลด — กัน payload ใหญ่จน provider 502, เร็วขึ้น, ประหยัดค่า API */
function compressImage(file,maxPx=1600,quality=0.82){
  return new Promise(res=>{
    if(!file.type.startsWith("image/"))return res(file);
    const img=new Image();
    img.onload=()=>{
      let{width:w,height:h}=img;
      if(Math.max(w,h)>maxPx){const s=maxPx/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s)}
      const cv=document.createElement("canvas");cv.width=w;cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      cv.toBlob(b=>res(b&&b.size<file.size?b:file),"image/jpeg",quality);
    };
    img.onerror=()=>res(file);
    img.src=URL.createObjectURL(file);
  });
}
async function filesToForm(files,extra={}){
  const fd=new FormData();
  for(const f of files)fd.append("files",await compressImage(f),
    (f.name||"photo").replace(/\.\w+$/,"")+".jpg");
  for(const[k,v]of Object.entries(extra))fd.append(k,v);
  return fd;
}
function addFromPhoto(){
  const inp=document.createElement("input");
  inp.type="file";inp.accept="image/*";inp.multiple=true;
  // ไม่ตั้ง capture: มือถือจะแสดงตัวเลือก ถ่ายภาพ / คลังรูป / เลือกไฟล์ · desktop เปิด file picker
  inp.onchange=async()=>{
    if(!inp.files.length)return;
    $("#cands").innerHTML=`<span class="muted">กำลังเตรียมภาพ…</span>`;
    const fd=await filesToForm(inp.files,{media_type:"auto"});
    $("#cands").innerHTML=`<span class="muted">กำลังอ่านภาพ… (ปกติ 5–15 วินาที)</span>`;
    let x;
    try{
      const r=await fetch("/api/vision/extract",{method:"POST",body:fd});
      if(!r.ok){
        const d=await r.json().catch(()=>({detail:r.statusText}));
        $("#cands").innerHTML=`<span class="muted">✕ อ่านภาพไม่สำเร็จ: ${d.detail}
          ${r.status===503?"<br>ไปตั้งค่า AI provider ที่ DAM app แท็บตั้งค่า":""}
          ${r.status===402?"<br>เครดิต API หมด — เติมหรือสลับ provider ที่ DAM app":""}</span>`;
        return;
      }
      x=await r.json();
    }catch(e){$("#cands").innerHTML=`<span class="muted">✕ เชื่อมต่อไม่ได้: ${e.message}</span>`;return}
    ADD_HASHES=x.photo_hashes||[];
    const t=x.media_type||"Book";
    if(t&&META.types[t]&&$("#add-type").value!==t){$("#add-type").value=t;buildFields(t,{});}
    // ภาพ = ตัวระบุตัวตนเท่านั้น: ใส่แค่ชื่อ+ผู้เขียน แล้วเก็บที่เหลือไว้เป็น fallback
    const by=(x.work?.creators||[]).join(", ")||x.props?.author_display||"";
    setVal("title_display",x.title);
    setVal("author_display",by);setVal("artist_display",by);setVal("director_display",by);
    window.__photoFallback={title:x.title,props:x.props||{},by,
      publisher:x.work?.publisher,fields:{genres:x.work?.genres},
      cover_url:ADD_HASHES.length?("/api/photo/"+ADD_HASHES[0]):""};
    const isbn=(x.props?.isbn_13||"").replace(/\D/g,"")||x.props?.catalog_no;

    if(isbn||x.title)await runLookup(by.split(",")[0].trim(),"photo");
    else $("#cands").innerHTML=`<span class="muted">อ่านชื่อจากภาพไม่ได้ — กรอกเองหรือลองถ่ายให้ชัดขึ้น</span>`;

async function runLookup(artist,mode){
  const q=$("#lk-q").value.trim();
  if(!q)return toast("ใส่ ISBN หรือชื่อก่อน",true);
  const type=$("#add-type").value;
  const isIsbn=/^[0-9Xx\- ]{8,17}$/.test(q);
  const p=new URLSearchParams({type});
  if(isIsbn)p.set("isbn",q.replace(/[\- ]/g,""));else p.set("q",q);
  if(typeof artist==="string"&&artist)p.set("artist",artist);
  $("#cands").innerHTML=`<span class="muted">กำลังค้นข้อมูลบรรณานุกรม…</span>`;
  try{
    const r=await api("/api/lookup?"+p);
    if(!r.candidates.length){
      // ค้นไม่เจอ + มาจากภาพ → ใช้ข้อมูลที่อ่านจากภาพเป็น fallback
      if(mode==="photo"&&window.__photoFallback){
        fillForm(type,window.__photoFallback);
        const thai=/[฀-๿]/.test(q);
        $("#cands").innerHTML=`<span class="muted">ไม่พบในฐานข้อมูล${thai?" (หนังสือไทยหลายเล่มยังไม่มีใน Google Books)":""} — ใช้ข้อมูลจากภาพแทน · ตรวจ/เติมก่อนบันทึก</span>`;
        return;
      }
      const thai=/[฀-๿]/.test(q)||/^97861|^978616|^978974/.test(q.replace(/\D/g,""));
      $("#cands").innerHTML=`<span class="muted">ไม่พบในฐานข้อมูล${thai?
        " — หนังสือไทยหลายเล่มยังไม่มีใน Google Books ลองถ่ายให้ AI ระบุ แล้วกรอกส่วนที่ขาด":
        " — กรอกเองหรือลองคำค้นอื่น"}</span>`;
      return;
    }
    window.__cands=r.candidates;
    const list=r.candidates.map((c,i)=>
      `<div onclick='pickCand(${i})' style="display:flex;gap:10px;align-items:center;cursor:pointer;
        padding:6px;border-radius:8px;border:1px solid var(--line);margin-top:6px">
        ${c.cover_url?`<img src="${c.cover_url}" style="height:52px;border-radius:4px"
          onerror="this.style.display='none'"/>`:""}
        <div style="flex:1"><div style="font-size:13px">${c.title}</div>
        <div class="muted">${[c.by,c.year,c.publisher].filter(Boolean).join(" · ")}
        <span style="color:var(--gold)">· ${c.source}</span></div></div>
        <span class="muted">เลือก ›</span></div>`).join("");
    // แหล่งข้อมูล = หลัก: ISBN เจอผลเดียว หรือจากภาพ+ชื่อตรง → ดึงข้อมูลครบทันที
    const top=r.candidates[0], tt=(top.title||"").toLowerCase();
    const cur=q.toLowerCase();
    const strong=(mode==="photo"&&tt&&
      (tt.includes(cur.slice(0,12))||cur.includes(tt.slice(0,12))));
    if((isIsbn&&r.candidates.length===1)||strong){
      pickCand(0);
      $("#cands").innerHTML=`<span class="muted">✓ ดึงข้อมูลจาก ${top.source} แล้ว — ตรวจสอบก่อนบันทึก`+
        (r.candidates.length>1?`<br>หรือเลือก edition อื่น:</span>${list}`:"</span>");
      return;
    }
    $("#cands").innerHTML=(mode==="photo"
      ?`<span class="muted">พบ ${r.candidates.length} เล่มใกล้เคียง — เลือก edition ที่ตรงเพื่อดึงข้อมูลครบ</span>`
      :"")+list;
  }catch(e){$("#cands").innerHTML=`<span class="muted">✕ ค้นไม่สำเร็จ: ${e.message}</span>`}
}
function pickCand(i){
  try{
    const c=window.__cands[i];
    fillForm(null,c);                       // ข้อมูลจากฐานข้อมูล = หลัก (เติมทุกช่อง)
    toast(`ใช้ข้อมูลจาก ${c.source} — ตรวจสอบก่อนบันทึก`);
  }catch(e){toast("เติมฟอร์มไม่สำเร็จ: "+e.message,true)}
}
async function submitItem(e){
  const type=$("#add-type").value;
  const fd=new FormData(e.target),p={},extra={};
  for(const[k,v]of fd.entries()){
    if(v==="")continue;
    if(k.startsWith("__")){extra[k.slice(2)]=v;continue}
    p[k]=(!isNaN(v)&&String(v).trim()!=="")?+v:v;
  }
  // ช่องผู้เขียน/ศิลปิน/ผู้กำกับ = แหล่งเดียวของโหนดบุคคล (หลายชื่อคั่น ,)
  extra.creators=p.author_display||p.artist_display||p.director_display||"";

  await api("/api/items",{method:"POST",body:{
    media_type:type,props:p,
    work:{title:p.title_display,
      creators:(extra.creators||"").split(",").map(s=>s.trim()).filter(Boolean),
      publisher:p.publisher||p.label||p.studio||"",

      genres:(extra.genres||"").split(",").map(s=>s.trim()).filter(Boolean)},

  for(const k of ["Book","VinylRecord","CompactDisc","DVD","CreativeWork",
                  "Person","Organization","Place","Concept"])
    if(labels.includes(k))return{...NODE_STYLE[k],key:k};
  return{color:"#777",shape:"dot",key:""};
}
let GMODE=null,DRILL={type:"",genre:""};
function toggleView(){
  GRAPH_MODE=!GRAPH_MODE;
  $("#shelf").style.display=GRAPH_MODE?"none":"grid";
  $("#pager").style.display=GRAPH_MODE?"none":"flex";
  $("#graph").style.display=GRAPH_MODE?"block":"none";
  $("#graph-bar").style.display=GRAPH_MODE?"flex":"none";
  $("#btn-view").textContent=GRAPH_MODE?"📚 มุมมองชั้นหนังสือ":"🕸️ มุมมองกราฟ";
  if(GRAPH_MODE)GMODE===null?autoGraphMode():loadGraph();
}
async function autoGraphMode(){
  // โหนดรวม ≤ 100 → แสดงเครือข่ายเต็มเป็นค่าเริ่มต้น เกินนั้นเริ่มที่ระดับประเภท
  try{
    const g=await api("/api/graph?limit=150");
    if(g.nodes.length<=100){GRAPHDATA=g;setModeButtons("explore");GMODE="explore";
      renderExplore(g);return}
  }catch(e){}
  setGraphMode("types");
}
function setModeButtons(m){
  for(const k of["explore","types","genres"])
    $("#gm-"+k).classList.toggle("on",m===k);
}
function setGraphMode(m){
  GMODE=m;DRILL={type:"",genre:""};
  setModeButtons(m);
  loadGraph();
}
function loadGraph(){
  if(GMODE===null)return autoGraphMode();
  return GMODE==="explore"?loadExplore():loadDrill();
}

/* ---------- โหมดหมวดหมู่เป็นชั้น (drill-down) ---------- */
function crumbs(){
  const root=GMODE==="genres"?"🔖 หมวดหมู่":"🏛 ห้องสมุด";
  const parts=[`<a href="#" style="color:var(--gold)"
    onclick='DRILL={type:"",genre:""};loadDrill();return false'>${root}</a>`];
  if(DRILL.type)parts.push(`<a href="#" style="color:var(--gold)"
    onclick='DRILL.genre="";loadDrill();return false'>${ICON[DRILL.type]} ${DRILL.type}</a>`);
  if(DRILL.genre)parts.push(`<span>${DRILL.genre}</span>`);
  $("#crumbs").innerHTML=parts.join(` <span class="muted">›</span> `);
}
async function loadDrill(){
  crumbs();
  const p=new URLSearchParams();
  let level=GMODE==="genres"?"genres":"root";
  if(DRILL.type){level=DRILL.genre?"genre":"type";p.set("type",DRILL.type)}
  else if(DRILL.genre)level="genre";
  if(DRILL.genre)p.set("genre",DRILL.genre);
  p.set("level",level);
  const d=await api("/api/graph/drill?"+p);
  const centerLabel=level==="root"?"🏛 ห้องสมุด"
    :level==="genres"?"🔖 หมวดหมู่ทั้งหมด"
    :level==="type"?`${ICON[DRILL.type]} ${DRILL.type}`:DRILL.genre;
  const maxC=Math.max(1,...d.children.map(c=>c.count));
  const nodes=[{id:"__center",label:centerLabel,shape:"box",margin:12,borderWidth:2,
    color:{background:"#3a2d1d",border:"var(--gold)"},
    font:{color:"#efe6d8",size:16,face:"Cormorant Garamond"}}];
  const edges=[];
  d.children.forEach(c=>{
    let n={id:c.key,label:`${c.label}${c.kind!=="item"?` (${c.count})`:""}`.slice(0,40),
      font:{color:"#efe6d8",size:12,face:"Sarabun"}};
    if(c.kind==="type"){
      n.shape="box";n.margin=10;
      n.color={background:"#2b231c",border:"#c9a35f"};
      n.font.size=14;
    }else if(c.kind==="genre"){
      n.shape="hexagon";
      n.size=12+18*(c.count/maxC);           // ใหญ่ตามจำนวน
      n.color={background:"#9b8ec4",border:"#171310"};
    }else{ // item — ใช้ปกถ้ามี
      const img=c.cover?("/api/photo/"+c.cover):(c.cover_url||"");
      if(img){n.shape="image";n.image=img;n.size=22;
        n.brokenImage=undefined;n.shapeProperties={useBorderWithImage:true};
        n.color={border:"#3d3227"};}
      else{n.shape="dot";n.size=10;n.color={background:"#c9a35f",border:"#171310"}}
      n.title=(c.by||"");
    }
    nodes.push(n);
    edges.push({from:"__center",to:c.key,color:{color:"#4a3a2a"}});
  });
  if(NETWORK)NETWORK.destroy();
  NETWORK=new vis.Network($("#graph"),{nodes,edges},
    {physics:{solver:"repulsion",repulsion:{nodeDistance:130,springLength:170},
      stabilization:{iterations:120}},interaction:{hover:true}});
  NETWORK.on("click",p=>{
    if(!p.nodes.length||p.nodes[0]==="__center")return;
    const c=d.children.find(x=>x.key===p.nodes[0]);
    if(!c)return;
    if(c.kind==="type"){DRILL.type=c.key;DRILL.genre="";loadDrill()}
    else if(c.kind==="genre"){DRILL.genre=c.key;loadDrill()}
    else openItem(c.key);                    // item → sidebar เดิม
  });
}

/* ---------- โหมดสำรวจเครือข่าย ---------- */
async function loadExplore(){
  const p=new URLSearchParams();
  if(TYPE)p.set("type",TYPE);
  if($("#q").value)p.set("q",$("#q").value);
  const g=await api("/api/graph?"+p);
  GRAPHDATA=g;
  renderExplore(g);
}
function renderExplore(g){
  $("#crumbs").innerHTML=`<span class="muted">${g.nodes.length} โหนด · ${g.rels.length} เส้น</span>`;
  const nodes=g.nodes.map(n=>{
    const st=styleOf(n.labels);
    const prefix=n.labels.includes("CreativeWork")?"งาน · ":"";
    return{id:n.id,shape:st.shape,size:st.key==="CreativeWork"?16:12,
      label:prefix+(n.props.title_display||n.props.name||"").slice(0,26),
      title:n.labels.join(":"),
      color:{background:st.color,border:"#171310"},
      font:{color:"#efe6d8",size:11,face:"Sarabun"}}});
  const edges=g.rels.map(r=>({from:r.from,to:r.to,label:r.type,arrows:"to",
    font:{size:8,color:"#a4907a",strokeWidth:0},color:{color:"#4a3a2a"}}));
  if(NETWORK)NETWORK.destroy();
  NETWORK=new vis.Network($("#graph"),{nodes,edges},
    {physics:{solver:"forceAtlas2Based",stabilization:{iterations:150}},
     interaction:{hover:true}});
  NETWORK.on("click",p=>{
    if(p.nodes.length)openGraphNode(p.nodes[0]);
  });
}

/* ---------- คลิกโหนดในกราฟ → ข้อมูลขึ้น sidebar ---------- */
const LABEL_TH={Person:"บุคคล",Organization:"องค์กร/สำนักพิมพ์/ค่าย",Place:"ตำแหน่งจัดเก็บ",
  Concept:"แนวคิด/หมวด",CreativeWork:"งานสร้างสรรค์",Book:"หนังสือ",
  VinylRecord:"แผ่นเสียง",CompactDisc:"CD",DVD:"DVD"};
function openGraphNode(id){
  const n=GRAPHDATA.nodes.find(x=>x.id===id);
  if(!n)return;
  if(n.labels.includes("LibraryItem"))return openItem(id);
  if(n.labels.includes("Person")&&n.props.name)return openPerson(n.props.name);
  genericNodeDrawer(n);
}
function genericNodeDrawer(n){
  const name=n.props.name||n.props.title_display||n.labels.at(-1);
  const kind=n.labels.map(l=>LABEL_TH[l]).find(Boolean)||n.labels.join(":");
  const kv=Object.entries(n.props)
    .filter(([k])=>!["canonical_id","name"].includes(k))
    .map(([k,v])=>`<b title="${ftip(k)}">${flabel(k)}</b><span>${v}</span>`).join("");
  const conns=GRAPHDATA.rels.filter(r=>r.from===n.id||r.to===n.id).map(r=>{
    const oid=r.from===n.id?r.to:r.from;
    const o=GRAPHDATA.nodes.find(x=>x.id===oid);
    if(!o)return"";
    const oname=o.props.title_display||o.props.name||o.labels.at(-1);
    return `<li style="font-size:13px;margin:3px 0">
      <span class="muted">${r.from===n.id?"→":"←"} ${r.type}</span>
      <a href="#" style="color:var(--gold)"
        onclick='openGraphNode(${JSON.stringify(oid)});return false'>${oname}</a></li>`;
  }).join("");
  $("#drawer").innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:start">
      <h2 class="serif" style="margin:0;color:var(--gold)">${name}</h2>
      <button class="ghost" onclick="$('#drawer').classList.remove('open')">✕</button></div>
    <p class="muted" style="font-style:italic;margin:4px 0 10px">${kind}</p>
    ${kv?`<div class="kv">${kv}</div>`:""}
    ${conns?`<h3 class="serif" style="margin:12px 0 4px">เชื่อมโยงกับ (${GRAPHDATA.rels.filter(r=>r.from===n.id||r.to===n.id).length})</h3>
      <ul style="margin:0;padding-left:16px">${conns}</ul>`
      :`<p class="muted">ไม่มีเส้นเชื่อมในมุมมองปัจจุบัน</p>`}`;
  $("#drawer").classList.add("open");
}

/* ---------- boot ---------- */
(async()=>{
  const st=await (await fetch("/api/auth/status")).json();
  if(st.setup_required){$("#a-note").textContent="ยังไม่มีบัญชี — สร้างที่ DAM app ก่อน แล้วใช้บัญชีเดียวกันที่นี่";}
  if(!st.authenticated){$("#auth").style.display="flex";return}
  $("#auth").style.display="none";
  await loadMeta();await loadShelf();
})();
</script>
